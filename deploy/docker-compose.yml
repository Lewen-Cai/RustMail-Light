services:
  rustmaild:
    image: ghcr.io/rustmail/rustmaild:latest
    container_name: rustmaild
    restart: unless-stopped
    env_file:
      - ../.env
    command: ["rustmaild", "--config", "/etc/rustmail/rustmaild.toml"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../config/rustmaild.toml:/etc/rustmail/rustmaild.toml:ro
      - ../data/mail:/var/lib/rustmail
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
      - "995:995"
    networks:
      - rustmail

  postgres:
    image: postgres:16-alpine
    container_name: rustmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rustmail}
      POSTGRES_USER: ${POSTGRES_USER:-rustmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rustmail} -d ${POSTGRES_DB:-rustmail}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rustmail

  redis:
    image: redis:7-alpine
    container_name: rustmail-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rustmail

  caddy:
    image: caddy:2.8-alpine
    container_name: rustmail-caddy
    restart: unless-stopped
    depends_on:
      - rustmaild
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/mail-ui/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rustmail

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  rustmail:
    name: rustmail-network
