name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  check:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-targets

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p rustmaild

      - uses: softprops/action-gh-release@v1
        with:
          files: target/release/rustmaild

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build rustmaild image
        run: docker build -f deploy/Dockerfile -t rustmaild:ci .

      - name: Export docker image
        run: docker save rustmaild:ci -o rustmaild-image.tar

      - name: Upload docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustmaild-docker-image
          path: rustmaild-image.tar
